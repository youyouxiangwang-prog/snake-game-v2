<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game V2</title>
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --grid-color: #1a1a3a;
            --snake-head: #00ff88;
            --snake-body: #009944;
            --food-color: #ff0066;
            --ui-text: #ffffff;
            --ui-accent: #00ffff;
            --danger: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            border: 2px solid var(--ui-accent);
            box-shadow: 0 0 20px var(--ui-accent), inset 0 0 20px rgba(0, 255, 255, 0.1);
            border-radius: 4px;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #ui > * {
            pointer-events: auto;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px;
            background: rgba(10, 10, 26, 0.95);
            border: 2px solid var(--ui-accent);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .screen.active {
            display: flex;
        }

        h1 {
            color: var(--ui-accent);
            font-size: 2.5em;
            text-shadow: 0 0 10px var(--ui-accent), 0 0 20px var(--ui-accent);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        h2 {
            color: var(--snake-head);
            font-size: 1.8em;
            text-shadow: 0 0 10px var(--snake-head);
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid var(--ui-accent);
            background: transparent;
            color: var(--ui-accent);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        .btn:hover {
            background: var(--ui-accent);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--ui-accent);
        }

        .mode-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            font-size: 0.9em;
            border: 1px solid var(--ui-accent);
            background: transparent;
            color: var(--ui-accent);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        .mode-btn:hover, .mode-btn.selected {
            background: var(--ui-accent);
            color: var(--bg-dark);
        }

        #scoreDisplay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--ui-text);
            font-size: 1.2em;
            text-shadow: 0 0 5px var(--ui-accent);
            display: none;
        }

        #timerDisplay {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--food-color);
            font-size: 1.2em;
            text-shadow: 0 0 5px var(--food-color);
            display: none;
        }

        .score-final {
            font-size: 1.5em;
            color: var(--ui-text);
        }

        .high-score {
            color: var(--snake-head);
            font-size: 1.1em;
        }

        #touchControls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .touch-btn {
            width: 60px;
            height: 60px;
            border: 2px solid var(--ui-accent);
            background: rgba(0, 255, 255, 0.1);
            color: var(--ui-accent);
            font-size: 1.5em;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
        }

        .touch-grid {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .touch-grid > :nth-child(1) { grid-area: 1 / 2; }
        .touch-grid > :nth-child(2) { grid-area: 2 / 1; }
        .touch-grid > :nth-child(3) { grid-area: 2 / 3; }
        .touch-grid > :nth-child(4) { grid-area: 3 / 2; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            h2 { font-size: 1.4em; }
            .screen { padding: 20px; }
            #touchControls { display: block; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="scoreDisplay">Score: <span id="score">0</span></div>
        <div id="timerDisplay">Time: <span id="timer">60</span></div>
        
        <div id="ui">
            <div id="menuScreen" class="screen active">
                <h1>Snake V2</h1>
                <div class="mode-select">
                    <button class="mode-btn selected" data-mode="classic">Classic</button>
                    <button class="mode-btn" data-mode="timeAttack">Time Attack</button>
                    <button class="mode-btn" data-mode="obstacle">Obstacle</button>
                </div>
                <button class="btn" id="playBtn">Play</button>
            </div>
            
            <div id="pauseScreen" class="screen">
                <h2>Paused</h2>
                <button class="btn" id="resumeBtn">Resume</button>
                <button class="btn" id="menuBtnPause">Menu</button>
            </div>
            
            <div id="gameOverScreen" class="screen">
                <h2>Game Over</h2>
                <div class="score-final">Score: <span id="finalScore">0</span></div>
                <div class="high-score">High Score: <span id="highScore">0</span></div>
                <button class="btn" id="retryBtn">Retry</button>
                <button class="btn" id="menuBtn">Menu</button>
            </div>
        </div>
        
        <div id="touchControls">
            <div class="touch-grid">
                <button class="touch-btn" data-dir="up">▲</button>
                <button class="touch-btn" data-dir="left">◄</button>
                <button class="touch-btn" data-dir="right">►</button>
                <button class="touch-btn" data-dir="down">▼</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 20;
        const CELL_SIZE = 30;
        canvas.width = GRID_SIZE * CELL_SIZE;
        canvas.height = GRID_SIZE * CELL_SIZE;

        const STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused', GAME_OVER: 'gameOver' };
        
        let gameState = STATES.MENU;
        let selectedMode = 'classic';
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let obstacles = [];
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let timer = 60;
        let gameInterval = null;
        let timerInterval = null;
        let lastTime = 0;
        let tickRate = 150;
        let particles = [];

        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y) &&
                        !obstacles.some(o => o.x === food.x && o.y === food.y);
            }
        }

        function spawnObstacles() {
            obstacles = [];
            const count = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < count; i++) {
                let valid = false;
                let obs;
                while (!valid) {
                    obs = {
                        x: Math.floor(Math.random() * GRID_SIZE),
                        y: Math.floor(Math.random() * GRID_SIZE)
                    };
                    valid = !snake.some(s => s.x === obs.x && s.y === obs.y) &&
                            !(obs.x >= 8 && obs.x <= 12 && obs.y >= 8 && obs.y <= 12);
                }
                obstacles.push(obs);
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x * CELL_SIZE + CELL_SIZE / 2,
                    y: y * CELL_SIZE + CELL_SIZE / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 20,
                    color: color
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * (p.life / 20), 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
        }

        function drawGrid() {
            ctx.strokeStyle = '#1a1a3a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const gradient = ctx.createLinearGradient(
                    segment.x * CELL_SIZE, segment.y * CELL_SIZE,
                    segment.x * CELL_SIZE + CELL_SIZE, segment.y * CELL_SIZE + CELL_SIZE
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc66');
                } else {
                    const ratio = index / snake.length;
                    gradient.addColorStop(0, `rgb(0, ${Math.floor(204 - ratio * 80)}, ${Math.floor(100 - ratio * 30)})`);
                    gradient.addColorStop(1, `rgb(0, ${Math.floor(153 - ratio * 60)}, ${Math.floor(68 - ratio * 20)})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = index === 0 ? '#00ff88' : '#009944';
                ctx.shadowBlur = index === 0 ? 15 : 5;
                
                const padding = 2;
                ctx.fillRect(
                    segment.x * CELL_SIZE + padding,
                    segment.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2
                );
            });
            ctx.shadowBlur = 0;
        }

        function drawFood() {
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 4,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = '#ff0066';
            ctx.shadowColor = '#ff0066';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawObstacles() {
            ctx.fillStyle = '#333366';
            ctx.shadowColor = '#6666aa';
            ctx.shadowBlur = 10;
            obstacles.forEach(obs => {
                ctx.fillRect(
                    obs.x * CELL_SIZE + 2,
                    obs.y * CELL_SIZE + 2,
                    CELL_SIZE - 4,
                    CELL_SIZE - 4
                );
            });
            ctx.shadowBlur = 0;
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                if (selectedMode !== 'classic' || gameState !== STATES.PLAYING) {
                    gameOver();
                    return;
                }
                if (selectedMode === 'classic') {
                    gameOver();
                    return;
                }
            }
            
            if (obstacles.some(o => o.x === head.x && o.y === head.y)) {
                gameOver();
                return;
            }
            
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                createParticles(food.x, food.y, '#ff0066');
                spawnFood();
                
                if (selectedMode === 'timeAttack') {
                    timer = Math.min(timer + 5, 60);
                    document.getElementById('timer').textContent = timer;
                    if (timer >= 45) tickRate = 100;
                    else if (timer >= 30) tickRate = 120;
                    else tickRate = 150;
                    restartGameLoop();
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            drawObstacles();
            drawFood();
            drawSnake();
            drawParticles();
        }

        function gameLoop(currentTime) {
            if (gameState !== STATES.PLAYING) return;
            
            if (currentTime - lastTime >= tickRate) {
                update();
                lastTime = currentTime;
            }
            
            updateParticles();
            draw();
            
            if (gameState === STATES.PLAYING) {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGameLoop() {
            lastTime = 0;
            requestAnimationFrame(gameLoop);
        }

        function restartGameLoop() {
            if (gameInterval) clearInterval(gameInterval);
            startGameLoop();
        }

        function startGame() {
            gameState = STATES.PLAYING;
            score = 0;
            timer = 60;
            tickRate = 150;
            particles = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = timer;
            document.getElementById('scoreDisplay').style.display = 'block';
            document.getElementById('timerDisplay').style.display = selectedMode === 'timeAttack' ? 'block' : 'none';
            
            hideAllScreens();
            
            initSnake();
            spawnFood();
            if (selectedMode === 'obstacle') spawnObstacles();
            
            startGameLoop();
            
            if (selectedMode === 'timeAttack') {
                timerInterval = setInterval(() => {
                    timer--;
                    document.getElementById('timer').textContent = timer;
                    if (timer <= 0) {
                        gameOver();
                    }
                }, 1000);
            }
        }

        function gameOver() {
            gameState = STATES.GAME_OVER;
            if (gameInterval) clearInterval(gameInterval);
            if (timerInterval) clearInterval(timerInterval);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }
            
            document.getElementById('scoreDisplay').style.display = 'none';
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            showScreen('gameOverScreen');
        }

        function showScreen(screenId) {
            hideAllScreens();
            document.getElementById(screenId).classList.add('active');
        }

        function hideAllScreens() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        }

        function pauseGame() {
            if (gameState !== STATES.PLAYING) return;
            gameState = STATES.PAUSED;
            showScreen('pauseScreen');
        }

        function resumeGame() {
            if (gameState !== STATES.PAUSED) return;
            gameState = STATES.PLAYING;
            hideAllScreens();
            startGameLoop();
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            startGame();
        });

        document.getElementById('retryBtn').addEventListener('click', () => {
            startGame();
        });

        document.getElementById('resumeBtn').addEventListener('click', () => {
            resumeGame();
        });

        document.getElementById('menuBtn').addEventListener('click', () => {
            gameState = STATES.MENU;
            showScreen('menuScreen');
        });

        document.getElementById('menuBtnPause').addEventListener('click', () => {
            if (timerInterval) clearInterval(timerInterval);
            gameState = STATES.MENU;
            showScreen('menuScreen');
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedMode = btn.dataset.mode;
            });
        });

        document.addEventListener('keydown', (e) => {
            if (gameState === STATES.PAUSED && e.key === 'Escape') {
                resumeGame();
                return;
            }
            
            if (gameState === STATES.PLAYING && e.key === 'Escape') {
                pauseGame();
                return;
            }
            
            if (gameState !== STATES.PLAYING) return;
            
            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (gameState !== STATES.PLAYING) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: true });

        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameState !== STATES.PLAYING) return;
                
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up':
                        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'down':
                        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'left':
                        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'right':
                        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                        break;
                }
            });
        });

        draw();
    </script>
</body>
</html>
