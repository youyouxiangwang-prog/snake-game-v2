<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪食蛇 3D 🐍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a5a1a 0%, #2d8a2d 50%, #1a6a1a 100%);
            overflow: hidden;
        }
        
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 520px;
            padding: 10px 15px;
            background: linear-gradient(180deg, #fff 0%, #eee 100%);
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0077cc;
            text-shadow: 1px 1px 0 #fff;
        }
        
        .score {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 1px 1px 0 #fff;
        }
        
        .canvas-wrapper {
            position: relative;
            background: linear-gradient(180deg, #228822 0%, #44aa44 100%);
            padding: 10px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        #gameCanvas {
            display: block;
            border-radius: 8px;
            background: #1a1a2e;
        }
        
        /* Speed lines overlay */
        .speed-lines {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            pointer-events: none;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .speed-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            height: 2px;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flicker {
            from { opacity: 0.2; }
            to { opacity: 0.5; }
        }
        
        /* 3D border effect */
        .canvas-wrapper::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            pointer-events: none;
        }
        
        .mode-select {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .mode-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        
        .mode-btn.active {
            background: linear-gradient(180deg, #ff6666 0%, #ff3333 100%);
            color: white;
        }
        
        .mode-btn:not(.active) {
            background: linear-gradient(180deg, #fff 0%, #eee 100%);
            color: #0077cc;
        }
        
        .mode-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }
        
        /* Menu Overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,50,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 0;
        }
        
        .menu-overlay.hidden { display: none; }
        
        .menu-title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px #ff6666, 0 0 40px #ff3333;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #ff6666, 0 0 40px #ff3333; }
            to { text-shadow: 0 0 30px #ff9999, 0 0 60px #ff6666; }
        }
        
        .menu-btn {
            width: 220px;
            padding: 18px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }
        
        .menu-btn.primary {
            background: linear-gradient(180deg, #44dd44 0%, #22aa22 100%);
            color: white;
        }
        
        .menu-btn.secondary {
            background: linear-gradient(180deg, #fff 0%, #ddd 100%);
            color: #0077cc;
        }
        
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }
        
        /* Game Over */
        .gameover-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .gameover-overlay.hidden { display: none; }
        
        .gameover-title {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .new-record {
            color: #ffdd00;
            font-size: 1.5rem;
            margin-bottom: 20px;
            animation: pulse 0.5s ease infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        /* Particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }
        
        /* Score popup */
        .score-popup {
            position: fixed;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffdd00;
            text-shadow: 0 0 10px #ff8800;
            pointer-events: none;
            z-index: 50;
            animation: floatUp 0.8s ease-out forwards;
        }
        
        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
    </style>
</head>
<body>
    <!-- Menu -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-title">🐍 贪食蛇 3D 🐍</div>
        <button class="menu-btn primary" onclick="startGame()">▶ 开始游戏</button>
        <button class="menu-btn secondary" onclick="showHighScores()">🏆 最高分</button>
    </div>
    
    <!-- Game Over -->
    <div class="gameover-overlay hidden" id="gameoverOverlay">
        <div class="gameover-title">💀 游戏结束 💀</div>
        <div class="final-score">得分: <span id="finalScore">0</span></div>
        <div class="new-record hidden" id="newRecord">🎉 新纪录！🎉</div>
        <button class="menu-btn primary" onclick="startGame()">🔄 再来一局</button>
        <button class="menu-btn secondary" onclick="goToMenu()">📜 返回菜单</button>
    </div>
    
    <!-- Game Container -->
    <div class="top-bar">
        <div class="title">🐍 贪食蛇 3D</div>
        <div class="score">分数: <span id="scoreDisplay">0</span></div>
    </div>
    
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="speed-lines" id="speedLines"></div>
    </div>
    
    <div class="mode-select">
        <button class="mode-btn active" data-mode="classic" onclick="setMode('classic')">🎮 经典</button>
        <button class="mode-btn" data-mode="time" onclick="setMode('time')">⏱️ 限时</button>
        <button class="mode-btn" data-mode="obstacle" onclick="setMode('obstacle')">🧱 障碍</button>
    </div>

    <script>
    // Game Constants
    const GRID = 20;
    const CELL = 25;
    const SIZE = GRID * CELL;
    
    // Colors
    const COLORS = {
        ground1: '#228822',
        ground2: '#44aa44',
        snakeBody: '#00aaff',
        snakeHighlight: '#66ddff',
        snakeShadow: '#0077cc',
        appleRed: '#ff3333',
        appleHighlight: '#ff8888',
        appleShadow: '#cc2222',
        leaf: '#44cc44',
        obstacle: '#888888'
    };
    
    // Game State
    let canvas, ctx;
    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = 0, dy = -1;
    let score = 0;
    let gameLoop;
    let isPlaying = false;
    let currentMode = 'classic';
    let timeLeft = 60;
    let obstacles = [];
    let speed = 150;
    let animFrame = 0;
    
    // Initialize
    function init() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        createSpeedLines();
        adjustSize();
        window.addEventListener('resize', adjustSize);
        
        // Touch controls
        let tx = 0, ty = 0;
        canvas.addEventListener('touchstart', e => {
            tx = e.touches[0].clientX;
            ty = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            if (!isPlaying) return;
            const ex = e.changedTouches[0].clientX;
            const ey = e.changedTouches[0].clientY;
            const dx = ex - tx, dy = ey - ty;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && dx !== 1) { dx = 1; dy = 0; }
                else if (dx < -30 && dx !== -1) { dx = -1; dy = 0; }
            } else {
                if (dy > 30 && dy !== 1) { dx = 0; dy = 1; }
                else if (dy < -30 && dy !== -1) { dx = 0; dy = -1; }
            }
        });
        
        // Keyboard
        document.addEventListener('keydown', e => {
            if (!isPlaying) return;
            switch(e.key) {
                case 'ArrowUp': if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if (dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });
    }
    
    // Create speed lines
    function createSpeedLines() {
        const container = document.getElementById('speedLines');
        const corners = [
            { top: 0, left: 0, angle: 45 },
            { top: 0, right: 0, angle: 135 },
            { bottom: 0, left: 0, angle: 315 },
            { bottom: 0, right: 0, angle: 225 }
        ];
        
        corners.forEach(corner => {
            for (let i = 0; i < 3; i++) {
                const line = document.createElement('div');
                line.className = 'speed-line';
                const len = 50 + Math.random() * 50;
                const offset = (i - 1) * 20;
                line.style.width = len + 'px';
                line.style.transformOrigin = 'left center';
                
                if (corner.top !== undefined) line.style.top = corner.top + 'px';
                else line.style.bottom = corner.bottom + 'px';
                if (corner.left !== undefined) line.style.left = corner.left + 'px';
                else line.style.right = corner.right + 'px';
                
                line.style.transform = `rotate(${corner.angle + offset}deg)`;
                line.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(line);
            }
        });
    }
    
    // Adjust canvas size
    function adjustSize() {
        const max = Math.min(window.innerWidth - 40, 500);
        canvas.style.width = max + 'px';
        canvas.style.height = max + 'px';
    }
    
    // Set game mode
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.mode === mode);
        });
    }
    
    // Start game
    function startGame() {
        document.getElementById('menuOverlay').classList.add('hidden');
        document.getElementById('gameoverOverlay').classList.add('hidden');
        
        initGame();
        isPlaying = true;
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(step, speed);
        requestAnimationFrame(render);
    }
    
    // Init game
    function initGame() {
        snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];
        dx = 0; dy = -1;
        score = 0;
        timeLeft = 60;
        obstacles = [];
        speed = 150;
        document.getElementById('scoreDisplay').textContent = score;
        
        placeFood();
        
        if (currentMode === 'obstacle') {
            for (let i = 0; i < 5; i++) addObstacle();
        }
    }
    
    // Place food
    function placeFood() {
        let valid = false;
        while (!valid) {
            food = {
                x: Math.floor(Math.random() * GRID),
                y: Math.floor(Math.random() * GRID)
            };
            valid = !snake.some(s => s.x === food.x && s.y === food.y) &&
                    !obstacles.some(o => o.x === food.x && o.y === food.y);
        }
    }
    
    // Add obstacle
    function addObstacle() {
        if (obstacles.length >= 15) return;
        let valid = false, ox, oy;
        while (!valid) {
            ox = Math.floor(Math.random() * GRID);
            oy = Math.floor(Math.random() * GRID);
            valid = !snake.some(s => s.x === ox && s.y === oy) &&
                    !(food.x === ox && food.y === oy);
        }
        obstacles.push({ x: ox, y: oy });
    }
    
    // Game step
    function step() {
        if (!isPlaying) return;
        
        if (currentMode === 'time') {
            timeLeft -= 0.15;
            if (timeLeft <= 0) { gameOver(); return; }
        }
        
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };
        
        // Wall collision
        if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
            gameOver(); return;
        }
        
        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            gameOver(); return;
        }
        
        // Obstacle collision
        if (currentMode === 'obstacle' && obstacles.some(o => o.x === head.x && o.y === head.y)) {
            gameOver(); return;
        }
        
        snake.unshift(head);
        
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            document.getElementById('scoreDisplay').textContent = score;
            createParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2, '#ff3333');
            showScorePopup(food.x * CELL + CELL/2, food.y * CELL + CELL/2);
            placeFood();
            
            if (currentMode === 'obstacle' && score % 30 === 0) addObstacle();
            if (currentMode === 'time' && score % 50 === 0) speed = Math.max(80, speed - 10);
        } else {
            snake.pop();
        }
    }
    
    // Create particles
    function createParticles(x, y, color) {
        const container = document.body;
        for (let i = 0; i < 8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.width = '8px';
            p.style.height = '8px';
            p.style.background = color;
            container.appendChild(p);
            
            const angle = (Math.PI * 2 / 8) * i;
            const v = 50 + Math.random() * 50;
            let px = x, py = y, opacity = 1;
            
            const animate = () => {
                px += Math.cos(angle) * 3;
                py += Math.sin(angle) * 3;
                opacity -= 0.05;
                p.style.left = px + 'px';
                p.style.top = py + 'px';
                p.style.opacity = opacity;
                if (opacity > 0) requestAnimationFrame(animate);
                else p.remove();
            };
            requestAnimationFrame(animate);
        }
    }
    
    // Show score popup
    function showScorePopup(x, y) {
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = '+10';
        popup.style.left = x + 'px';
        popup.style.top = y + 'px';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 800);
    }
    
    // Render
    function render() {
        if (!isPlaying) return;
        animFrame++;
        
        // Clear
        ctx.fillStyle = '#1a3a1a';
        ctx.fillRect(0, 0, SIZE, SIZE);
        
        // Draw ground grid
        for (let i = 0; i < GRID; i++) {
            for (let j = 0; j < GRID; j++) {
                const isLight = (i + j) % 2 === 0;
                ctx.fillStyle = isLight ? COLORS.ground1 : COLORS.ground2;
                ctx.fillRect(i * CELL, j * CELL, CELL, CELL);
            }
        }
        
        // Draw obstacles (3D cubes)
        obstacles.forEach(o => drawObstacle(o.x, o.y));
        
        // Draw food (3D apple)
        drawApple(food.x, food.y);
        
        // Draw snake
        snake.forEach((s, i) => drawSnakeSegment(s.x, s.y, i === 0));
        
        // Draw timer
        if (currentMode === 'time') {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(`⏱️ ${Math.ceil(timeLeft)}s`, 10, 25);
        }
        
        requestAnimationFrame(render);
    }
    
    // Draw 3D apple
    function drawApple(gx, gy) {
        const x = gx * CELL + CELL / 2;
        const y = gy * CELL + CELL / 2;
        const r = CELL / 2 - 2;
        
        // Apple body gradient
        const grad = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, r);
        grad.addColorStop(0, COLORS.appleHighlight);
        grad.addColorStop(0.5, COLORS.appleRed);
        grad.addColorStop(1, COLORS.appleShadow);
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        
        // Leaf
        ctx.fillStyle = COLORS.leaf;
        ctx.beginPath();
        ctx.ellipse(x + 4, y - r + 2, 4, 6, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
        
        // Stem
        ctx.fillStyle = '#886633';
        ctx.fillRect(x - 2, y - r - 4, 4, 6);
        
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(x - 3, y - 3, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Draw 3D obstacle
    function drawObstacle(gx, gy) {
        const x = gx * CELL;
        const y = gy * CELL;
        const s = CELL - 2;
        
        // Top face
        const grad1 = ctx.createLinearGradient(x, y, x, y + s);
        grad1.addColorStop(0, '#aaaaaa');
        grad1.addColorStop(1, '#666666');
        ctx.fillStyle = grad1;
        ctx.fillRect(x + 2, y + 2, s - 2, s - 2);
        
        // Front face (darker)
        ctx.fillStyle = '#555555';
        ctx.fillRect(x + 2, y + s/2, s - 2, s/2 - 2);
    }
    
    // Draw snake segment (3D)
    function drawSnakeSegment(gx, gy, isHead) {
        const x = gx * CELL + 2;
        const y = gy * CELL + 2;
        const s = isHead ? CELL : CELL - 4;
        const offset = isHead ? 0 : 2;
        
        // 3D gradient
        const grad = ctx.createRadialGradient(
            x + s/2, y + s/2 - 3, 0,
            x + s/2, y + s/2, s
        );
        grad.addColorStop(0, COLORS.snakeHighlight);
        grad.addColorStop(0.5, COLORS.snakeBody);
        grad.addColorStop(1, COLORS.snakeShadow);
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x + offset, y + offset, s, s, isHead ? 8 : 5);
        ctx.fill();
        
        if (isHead) {
            // Big cartoon eyes
            const eyeY = y + 6;
            const eyeSize = 6;
            
            // Left eye (white)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x + 7, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            // Left pupil (looking up)
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 8, eyeY - 2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Right eye (white)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x + 18, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            // Right pupil
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 19, eyeY - 2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Smile
            ctx.strokeStyle = '#0066aa';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 12, y + 15, 5, 0, Math.PI);
            ctx.stroke();
        }
    }
    
    // Game over
    function gameOver() {
        isPlaying = false;
        clearInterval(gameLoop);
        
        const highscores = JSON.parse(localStorage.getItem('snakeV2_3d_hs') || '{}');
        const prev = highscores[currentMode] || 0;
        
        if (score > prev) {
            highscores[currentMode] = score;
            localStorage.setItem('snakeV2_3d_hs', JSON.stringify(highscores));
            document.getElementById('newRecord').classList.remove('hidden');
        } else {
            document.getElementById('newRecord').classList.add('hidden');
        }
        
        document.getElementById('finalScore').textContent = score;
        document.getElementById('gameoverOverlay').classList.remove('hidden');
    }
    
    // Go to menu
    function goToMenu() {
        document.getElementById('gameoverOverlay').classList.add('hidden');
        document.getElementById('menuOverlay').classList.remove('hidden');
    }
    
    // Show high scores
    function showHighScores() {
        const hs = JSON.parse(localStorage.getItem('snakeV2_3d_hs') || '{}');
        alert(`🏆 最高分\n🎮 经典: ${hs.classic || 0}\n⏱️ 限时: ${hs.time || 0}\n🧱 障碍: ${hs.obstacle || 0}`);
    }
    
    // Start
    window.onload = init;
    </script>
</body>
</html>
